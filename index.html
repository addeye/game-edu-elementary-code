<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ayo Belajar: SD Quiz & Coding</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #4F46E5;
            --primary-light: #818CF8;
            --accent: #F59E0B;
            --success: #10B981;
            --danger: #EF4444;
            --bg-color: #F3F4F6;
            --card-bg: #FFFFFF;
            --text-main: #1F2937;
            --text-sub: #6B7280;
            --spring: cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        #app {
            width: 100%;
            max-width: 480px;
            height: 100%;
            max-height: 900px;
            background: var(--card-bg);
            position: relative;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        @media (min-width: 500px) {
            #app { height: 90vh; border-radius: 24px; }
        }

        /* --- Header --- */
        .header {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            z-index: 20;
            flex-shrink: 0;
            border-bottom: 1px solid #f0f0f0;
        }

        .score-badge {
            background: var(--primary);
            color: white;
            padding: 6px 14px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 0.9rem;
            box-shadow: 0 2px 5px rgba(79, 70, 229, 0.3);
        }

        /* --- Screens & Layout --- */
        .content-area {
            flex: 1;
            position: relative;
            overflow-y: auto;
            width: 100%;
            padding-bottom: 20px;
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            min-height: 100%;
            display: flex;
            flex-direction: column;
            padding: 20px;
            opacity: 0;
            pointer-events: none;
            transform: scale(0.95) translateY(20px);
            transition: all 0.4s var(--spring);
            z-index: 0;
        }

        .screen.active {
            opacity: 1;
            pointer-events: auto;
            transform: scale(1) translateY(0);
            z-index: 10;
        }

        /* --- Menu Screen --- */
        #menu-screen { justify-content: center; text-align: center; align-items: center; }
        .hero-title { font-size: 2.2rem; font-weight: 900; color: var(--primary); margin-bottom: 20px; line-height: 1.2; }

        .subject-card {
            background: white; border: 2px solid #E5E7EB; border-radius: 20px; padding: 15px 20px;
            margin-bottom: 15px; width: 100%; display: flex; align-items: center; cursor: pointer;
            transition: transform 0.2s var(--spring); box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }
        .subject-card:hover { transform: scale(1.02); border-color: var(--primary-light); }

        .icon-box { width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; margin-right: 15px; }
        .math-icon { background: #DBEAFE; color: #2563EB; }
        .english-icon { background: #FEF3C7; color: #D97706; }
        .logic-icon { background: #D1FAE5; color: #059669; } /* Warna baru untuk Coding */

        /* --- Quiz Screen --- */
        .progress-container { width: 100%; height: 8px; background: #E5E7EB; border-radius: 10px; margin-bottom: 25px; flex-shrink: 0; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--accent); width: 0%; transition: width 0.4s ease; }

        .question-card {
            background: white; padding: 20px; border-radius: 24px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05);
            text-align: center; margin-bottom: 20px; flex-shrink: 0; display: flex; flex-direction: column; justify-content: center; align-items: center;
            border: 2px solid transparent;
        }
        .question-text { font-size: 1.8rem; font-weight: 800; color: var(--text-main); margin-bottom: 8px; }
        .question-hint { font-size: 0.95rem; color: var(--text-sub); }

        /* --- Regular Quiz Options --- */
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
        .option-btn {
            background: #F9FAFB; border: 2px solid #E5E7EB; padding: 20px 10px; font-size: 1.4rem;
            border-radius: 16px; color: var(--text-main); font-weight: 700; cursor: pointer; transition: all 0.2s; box-shadow: 0 2px 0 #E5E7EB;
        }
        .option-btn:hover { background: #EFF6FF; border-color: var(--primary-light); transform: translateY(-2px); }
        
        /* --- Coding / Logic Game Specific Styles --- */
        .logic-container {
            display: flex; flex-direction: column; align-items: center; width: 100%;
        }

        .grid-game {
            display: grid; gap: 5px; background: #E5E7EB; padding: 5px; border-radius: 12px;
            margin-bottom: 20px; width: 100%; max-width: 250px; aspect-ratio: 1;
        }
        
        .cell {
            background: white; border-radius: 8px; display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; position: relative;
        }

        .robot {
            z-index: 2; transition: all 0.3s var(--spring); filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
        }

        .command-display {
            background: #1F2937; color: #10B981; padding: 10px; border-radius: 12px;
            width: 100%; min-height: 50px; display: flex; flex-wrap: wrap; gap: 5px;
            margin-bottom: 15px; font-family: 'Courier New', monospace; font-size: 0.9rem;
            align-items: center; justify-content: center;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.3);
        }

        .command-chip {
            background: #374151; padding: 4px 8px; border-radius: 4px; border: 1px solid #4B5563;
            animation: pop 0.2s var(--spring);
        }

        .control-pad {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
            width: 180px; margin-bottom: 15px;
        }

        .ctrl-btn {
            background: white; border: 2px solid #E5E7EB; border-radius: 12px;
            padding: 10px; font-size: 1.2rem; cursor: pointer; transition: 0.1s;
            display: flex; justify-content: center; align-items: center;
        }
        .ctrl-btn:active { background: #F3F4F6; transform: scale(0.95); }

        .btn-run {
            background: var(--success); color: white; width: 100%; padding: 12px; border-radius: 12px;
            border: none; font-weight: bold; font-size: 1rem; cursor: pointer; box-shadow: 0 4px 0 #059669;
        }
        .btn-run:active { transform: translateY(4px); box-shadow: none; }

        .btn-reset {
            background: var(--danger); color: white; width: 100%; padding: 10px; border-radius: 12px;
            border: none; font-size: 0.9rem; cursor: pointer; margin-top: 10px;
        }

        /* --- Result Screen --- */
        #result-screen { text-align: center; justify-content: center; align-items: center; }
        .result-emoji { font-size: 5rem; margin-bottom: 20px; display: block; animation: bounce 2s infinite; }
        .result-score { font-size: 3rem; font-weight: 900; color: var(--primary); margin-bottom: 5px; }

        /* --- Utils --- */
        #confetti-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 50; }
        .footer-nav { padding: 10px; text-align: center; background: white; border-top: 1px solid #f0f0f0; flex-shrink: 0; }
        .btn-text { background: none; color: var(--text-sub); font-size: 0.9rem; text-decoration: underline; border: none; cursor: pointer; }
        .btn-primary { background: var(--primary); color: white; padding: 15px 30px; font-size: 1.1rem; width: 100%; margin-top: 10px; border-radius: 16px; border:none; font-weight:bold; cursor:pointer; box-shadow: 0 4px 0 #3730A3; }

        .correct-anim { background: var(--success) !important; color: white !important; border-color: var(--success) !important; animation: pop 0.3s var(--spring); }
        .wrong-anim { background: var(--danger) !important; color: white !important; border-color: var(--danger) !important; animation: shake 0.4s ease-in-out; }
        
        @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-8px); } 75% { transform: translateX(8px); } }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-15px);} 60% {transform: translateY(-7px);} }
    </style>
</head>
<body>

    <div id="app">
        <canvas id="confetti-canvas"></canvas>
        
        <div class="header">
            <div style="font-weight:800; color:var(--primary);">Belajar SD</div>
            <div class="score-badge">Skor: <span id="score-display">0</span></div>
        </div>

        <div class="content-area">
            
            <!-- MENU SCREEN -->
            <div id="menu-screen" class="screen active">
                <h1 class="hero-title">Hai Teman!👋</h1>
                <p style="margin-bottom: 30px; color: var(--text-sub);">Pilih pelajaran seru hari ini</p>
                
                <div class="subject-card" onclick="app.startQuiz('math')">
                    <div class="icon-box math-icon">🧮</div>
                    <div class="subject-info" style="text-align:left;">
                        <h3 style="margin-bottom: 2px;">Matematika</h3>
                        <p style="font-size: 0.85rem; color: var(--text-sub);">Hitung angka mudah</p>
                    </div>
                </div>

                <div class="subject-card" onclick="app.startQuiz('english')">
                    <div class="icon-box english-icon">🔤</div>
                    <div class="subject-info" style="text-align:left;">
                        <h3 style="margin-bottom: 2px;">Bahasa Inggris</h3>
                        <p style="font-size: 0.85rem; color: var(--text-sub);">Belajar kosakata</p>
                    </div>
                </div>

                <!-- NEW: Coding Lesson -->
                <div class="subject-card" onclick="app.startQuiz('logic')">
                    <div class="icon-box logic-icon">🤖</div>
                    <div class="subject-info" style="text-align:left;">
                        <h3 style="margin-bottom: 2px;">Logika Coding</h3>
                        <p style="font-size: 0.85rem; color: var(--text-sub);">Bantu robot mencari jalan</p>
                    </div>
                </div>
            </div>

            <!-- QUIZ SCREEN -->
            <div id="quiz-screen" class="screen">
                <div class="progress-container">
                    <div class="progress-bar" id="progress-bar"></div>
                </div>

                <div class="question-card">
                    <div class="question-text" id="question-text">Siap?</div>
                    <div class="question-hint" id="question-hint">Klik Mulai</div>
                </div>

                <!-- Container for Math/English Options -->
                <div id="options-container" class="options-grid"></div>

                <!-- Container for Logic Game (Hidden by default) -->
                <div id="logic-container" class="logic-container" style="display: none;">
                    <div class="grid-game" id="grid-game">
                        <!-- Grid cells generated by JS -->
                    </div>
                    
                    <div class="command-display" id="command-display">
                        <span style="opacity: 0.5; font-size: 0.8rem;">Ketik perintah di sini...</span>
                    </div>

                    <div class="control-pad">
                        <div></div>
                        <button class="ctrl-btn" onclick="app.addCommand('up')">⬆️</button>
                        <div></div>
                        <button class="ctrl-btn" onclick="app.addCommand('left')">⬅️</button>
                        <button class="ctrl-btn" onclick="app.addCommand('down')">⬇️</button>
                        <button class="ctrl-btn" onclick="app.addCommand('right')">➡️</button>
                    </div>

                    <button class="btn-run" onclick="app.runLogic()">JALANKAN KODE 🚀</button>
                    <button class="btn-reset" onclick="app.resetLogic()">HAPUS / RESET</button>
                </div>

                <button class="btn-primary" id="next-btn" style="display:none;" onclick="app.nextQuestion()">Lanjut ➡️</button>
            </div>

            <!-- RESULT SCREEN -->
            <div id="result-screen" class="screen">
                <span class="result-emoji" id="result-emoji">🏆</span>
                <h2 class="result-score" id="final-score">0</h2>
                <p style="color:var(--text-sub); margin-bottom:30px;" id="result-msg">Hebat!</p>
                <button class="btn-primary" onclick="app.goHome()">Main Lagi 🏠</button>
            </div>

        </div>

        <div class="footer-nav">
            <button class="btn-text" onclick="app.goHome()" id="back-btn" style="display:none;">Kembali ke Menu</button>
        </div>
    </div>

    <script>
        const app = {
            state: {
                currentSubject: null,
                score: 0,
                questionIndex: 0,
                totalQuestions: 10,
                isAnswering: false,
                currentQuestion: null,
                // Logic Game State
                logicCommands: [],
                robotPos: {x:0, y:0},
                isRunning: false
            },

            englishData: [
                { word: "Cat", indo: "Kucing", options: ["Dog", "Cat", "Bird", "Fish"] },
                { word: "Apple", indo: "Apel", options: ["Mango", "Banana", "Apple", "Grape"] },
                { word: "Red", indo: "Merah", options: ["Blue", "Green", "Red", "Yellow"] },
                { word: "Book", indo: "Buku", options: ["Pencil", "Book", "Ruler", "Bag"] },
                { word: "Sun", indo: "Matahari", options: ["Moon", "Star", "Cloud", "Sun"] },
                { word: "Car", indo: "Mobil", options: ["Bike", "Bus", "Car", "Train"] },
                { word: "Happy", indo: "Senang", options: ["Sad", "Happy", "Angry", "Tired"] },
                { word: "Water", indo: "Air", options: ["Fire", "Earth", "Wind", "Water"] },
                { word: "One", indo: "Satu", options: ["Two", "Ten", "Five", "One"] },
                { word: "Tree", indo: "Pohon", options: ["Flower", "Grass", "Tree", "Leaf"] }
            ],

            // Logic Levels Data
            logicLevels: [
                { size: 3, start: {x:0, y:0}, end: {x:2, y:0}, walls: [], hint: "Arahkan ke kanan 2 kali" },
                { size: 3, start: {x:0, y:0}, end: {x:2, y:2}, walls: [], hint: "Ke bawah lalu ke kanan" },
                { size: 3, start: {x:2, y:2}, end: {x:0, y:0}, walls: [], hint: "Ke kiri lalu ke atas" },
                { size: 3, start: {x:0, y:0}, end: {x:2, y:2}, walls: [{x:1, y:0}, {x:0, y:1}], hint: "Hati-hati tembok!" },
                { size: 3, start: {x:0, y:2}, end: {x:2, y:0}, walls: [{x:1, y:1}], hint: "Lewati samping tembok" },
                { size: 4, start: {x:0, y:0}, end: {x:3, y:3}, walls: [{x:1, y:0}, {x:1, y:1}, {x:1, y:2}], hint: "Kelilingkan!" },
                { size: 4, start: {x:0, y:3}, end: {x:3, y:0}, walls: [{x:2, y:1}, {x:2, y:2}], hint: "Pikirkan jalurnya..." },
            ],

            init: function() {
                this.cacheDOM();
                this.updateScoreDisplay();
            },

            cacheDOM: function() {
                this.screens = {
                    menu: document.getElementById('menu-screen'),
                    quiz: document.getElementById('quiz-screen'),
                    result: document.getElementById('result-screen')
                };
                this.dom = {
                    score: document.getElementById('score-display'),
                    progressBar: document.getElementById('progress-bar'),
                    questionText: document.getElementById('question-text'),
                    questionHint: document.getElementById('question-hint'),
                    optionsContainer: document.getElementById('options-container'),
                    logicContainer: document.getElementById('logic-container'),
                    gridGame: document.getElementById('grid-game'),
                    commandDisplay: document.getElementById('command-display'),
                    nextBtn: document.getElementById('next-btn'),
                    finalScore: document.getElementById('final-score'),
                    resultEmoji: document.getElementById('result-emoji'),
                    resultMsg: document.getElementById('result-msg'),
                    backBtn: document.getElementById('back-btn')
                };
            },

            switchScreen: function(screenName) {
                Object.values(this.screens).forEach(el => el.classList.remove('active'));
                this.screens[screenName].classList.add('active');
                if (screenName === 'quiz') {
                    this.dom.backBtn.style.display = 'block';
                } else {
                    this.dom.backBtn.style.display = 'none';
                }
            },

            goHome: function() {
                this.switchScreen('menu');
                this.state.score = 0;
                this.updateScoreDisplay();
                confetti.clear();
            },

            startQuiz: function(subject) {
                this.state.currentSubject = subject;
                this.state.questionIndex = 0;
                this.state.score = 0;
                this.updateScoreDisplay();
                this.generateQuestion();
                this.switchScreen('quiz');
                this.dom.nextBtn.style.display = 'none';
            },

            generateQuestion: function() {
                this.state.isAnswering = true;
                this.dom.nextBtn.style.display = 'none';

                // Update Progress
                const progress = (this.state.questionIndex / this.state.totalQuestions) * 100;
                this.dom.progressBar.style.width = `${progress}%`;

                // Logic Routing
                if (this.state.currentSubject === 'math') {
                    this.renderMathQuestion();
                } else if (this.state.currentSubject === 'english') {
                    this.renderEnglishQuestion();
                } else if (this.state.currentSubject === 'logic') {
                    this.renderLogicQuestion();
                }
            },

            // --- MATH & ENGLISH LOGIC (Standard) ---
            renderMathQuestion: function() {
                this.toggleContainer('standard');
                const q = this.generateMathData();
                this.renderStandardUI(q);
            },
            renderEnglishQuestion: function() {
                this.toggleContainer('standard');
                const q = this.generateEnglishData();
                this.renderStandardUI(q);
            },
            
            generateMathData: function() {
                const types = ['add', 'sub', 'mul'];
                const type = types[Math.floor(Math.random() * types.length)];
                let a, b, answer, operator;
                if (type === 'add') {
                    a = Math.floor(Math.random() * 20) + 1; b = Math.floor(Math.random() * 20) + 1; answer = a + b; operator = "+";
                } else if (type === 'sub') {
                    a = Math.floor(Math.random() * 20) + 5; b = Math.floor(Math.random() * a); answer = a - b; operator = "-";
                } else {
                    a = Math.floor(Math.random() * 8) + 1; b = Math.floor(Math.random() * 8) + 1; answer = a * b; operator = "×";
                }
                let options = [answer];
                while (options.length < 4) {
                    let wrong = answer + Math.floor(Math.random() * 10) - 5;
                    if (wrong !== answer && wrong >= 0 && !options.includes(wrong)) options.push(wrong);
                }
                return { text: `${a} ${operator} ${b} = ?`, hint: "Hitung dengan teliti", options: options.sort(() => Math.random() - 0.5), answer: answer };
            },

            generateEnglishData: function() {
                const data = this.englishData[Math.floor(Math.random() * this.englishData.length)];
                return { text: `Bahasa Inggrisnya "${data.indo}"?`, hint: "Pilih kata yang benar", options: [...data.options].sort(() => Math.random() - 0.5), answer: data.word };
            },

            renderStandardUI: function(q) {
                this.dom.questionText.textContent = q.text;
                this.dom.questionText.style.fontSize = this.state.currentSubject === 'math' ? '2.2rem' : '1.4rem';
                this.dom.questionHint.textContent = q.hint;
                this.state.currentQuestion = q;

                this.dom.optionsContainer.innerHTML = '';
                q.options.forEach((opt) => {
                    const btn = document.createElement('button');
                    btn.className = 'option-btn';
                    btn.textContent = opt;
                    btn.onclick = () => this.checkStandardAnswer(opt, btn);
                    this.dom.optionsContainer.appendChild(btn);
                });
            },

            checkStandardAnswer: function(selectedVal, btnElement) {
                if (!this.state.isAnswering) return;
                this.state.isAnswering = false;
                const isCorrect = selectedVal == this.state.currentQuestion.answer;
                
                if (isCorrect) {
                    btnElement.classList.add('correct-anim');
                    this.state.score += 10;
                    this.playSound('success');
                } else {
                    btnElement.classList.add('wrong-anim');
                    this.playSound('error');
                }
                this.updateScoreDisplay();
                setTimeout(() => this.showNextButton(), 1000);
            },

            // --- LOGIC CODING LOGIC ---
            toggleContainer: function(type) {
                if (type === 'standard') {
                    this.dom.optionsContainer.style.display = 'grid';
                    this.dom.logicContainer.style.display = 'none';
                } else {
                    this.dom.optionsContainer.style.display = 'none';
                    this.dom.logicContainer.style.display = 'flex';
                }
            },

            renderLogicQuestion: function() {
                this.toggleContainer('logic');
                this.dom.questionText.textContent = "Misi Robot";
                this.dom.questionHint.textContent = "Susun kode untuk sampai ke bintang ⭐";
                
                // Pick level
                const levelIndex = this.state.questionIndex % this.logicLevels.length;
                const level = this.logicLevels[levelIndex];
                this.state.currentQuestion = level;

                // Reset state
                this.state.logicCommands = [];
                this.state.robotPos = {...level.start};
                this.state.isRunning = false;
                this.renderCommandDisplay();

                // Render Grid
                this.dom.gridGame.innerHTML = '';
                this.dom.gridGame.style.gridTemplateColumns = `repeat(${level.size}, 1fr)`;
                
                for(let y=0; y<level.size; y++) {
                    for(let x=0; x<level.size; x++) {
                        const cell = document.createElement('div');
                        cell.className = 'cell';
                        cell.id = `cell-${x}-${y}`;
                        
                        // Add Content
                        if (x === level.start.x && y === level.start.y) {
                            cell.innerHTML = '<div class="robot" id="robot-actor">🤖</div>';
                        } else if (x === level.end.x && y === level.end.y) {
                            cell.textContent = '⭐';
                        }
                        
                        // Check walls
                        const isWall = level.walls.some(w => w.x === x && w.y === y);
                        if (isWall) {
                            cell.textContent = '🧱';
                            cell.style.background = '#FEF2F2';
                        }

                        this.dom.gridGame.appendChild(cell);
                    }
                }
            },

            addCommand: function(dir) {
                if (this.state.isRunning) return;
                const symbols = { up: '⬆️', down: '⬇️', left: '⬅️', right: '➡️' };
                this.state.logicCommands.push(dir);
                this.renderCommandDisplay();
            },

            renderCommandDisplay: function() {
                const symbols = { up: '⬆️', down: '⬇️', left: '⬅️', right: '➡️' };
                this.dom.commandDisplay.innerHTML = '';
                if (this.state.logicCommands.length === 0) {
                    this.dom.commandDisplay.innerHTML = '<span style="opacity: 0.5; font-size: 0.8rem;">Ketik perintah di sini...</span>';
                    return;
                }
                this.state.logicCommands.forEach(cmd => {
                    const span = document.createElement('span');
                    span.className = 'command-chip';
                    span.textContent = symbols[cmd];
                    this.dom.commandDisplay.appendChild(span);
                });
            },

            resetLogic: function() {
                if (this.state.isRunning) return;
                this.state.logicCommands = [];
                this.renderCommandDisplay();
                // Reset robot pos
                const level = this.state.currentQuestion;
                this.moveRobotVisual(level.start.x, level.start.y);
            },

            moveRobotVisual: function(x, y) {
                const robot = document.getElementById('robot-actor');
                if(robot) robot.remove(); // Remove from old cell

                const targetCell = document.getElementById(`cell-${x}-${y}`);
                if(targetCell) {
                    targetCell.innerHTML = '<div class="robot" id="robot-actor">🤖</div>';
                }
            },

            runLogic: function() {
                if (this.state.isRunning || this.state.logicCommands.length === 0) return;
                this.state.isRunning = true;
                this.state.isAnswering = false; // Prevent double interactions

                const level = this.state.currentQuestion;
                const commands = [...this.state.logicCommands];
                let currentX = level.start.x;
                let currentY = level.start.y;

                let stepIndex = 0;

                const runStep = () => {
                    if (stepIndex >= commands.length) {
                        this.finishLogicRun(currentX, currentY, level);
                        return;
                    }

                    const cmd = commands[stepIndex];
                    let nextX = currentX;
                    let nextY = currentY;

                    if (cmd === 'up') nextY--;
                    if (cmd === 'down') nextY++;
                    if (cmd === 'left') nextX--;
                    if (cmd === 'right') nextX++;

                    // Bounds Check
                    if (nextX < 0 || nextX >= level.size || nextY < 0 || nextY >= level.size) {
                        this.playSound('error');
                        document.getElementById('robot-actor').classList.add('wrong-anim');
                        setTimeout(() => this.finishLogicRun(currentX, currentY, level), 1000);
                        return;
                    }

                    // Wall Check
                    const isWall = level.walls.some(w => w.x === nextX && w.y === nextY);
                    if (isWall) {
                        this.playSound('error');
                        document.getElementById('robot-actor').classList.add('wrong-anim');
                        setTimeout(() => this.finishLogicRun(currentX, currentY, level), 1000);
                        return;
                    }

                    // Move
                    currentX = nextX;
                    currentY = nextY;
                    this.moveRobotVisual(currentX, currentY);
                    
                    stepIndex++;
                    setTimeout(runStep, 500); // Delay antar langkah
                };

                runStep();
            },

            finishLogicRun: function(finalX, finalY, level) {
                const robot = document.getElementById('robot-actor');
                if(robot) robot.classList.remove('wrong-anim');

                const isWin = (finalX === level.end.x && finalY === level.end.y);

                if (isWin) {
                    this.state.score += 20; // More points for logic!
                    this.playSound('success');
                    const cell = document.getElementById(`cell-${finalX}-${finalY}`);
                    if(cell) cell.style.background = '#D1FAE5'; // Green bg
                } else {
                    this.playSound('error');
                }

                this.updateScoreDisplay();
                setTimeout(() => this.showNextButton(), 1500);
            },

            // --- General Flow ---
            showNextButton: function() {
                if(this.state.questionIndex === this.state.totalQuestions - 1) {
                    this.dom.nextBtn.textContent = "Lihat Hasil 🎉";
                } else {
                    this.dom.nextBtn.textContent = "Lanjut ➡️";
                }
                this.dom.nextBtn.style.display = 'block';
                this.dom.nextBtn.focus();
            },

            nextQuestion: function() {
                this.state.questionIndex++;
                if (this.state.questionIndex >= this.state.totalQuestions) {
                    this.showResults();
                } else {
                    this.generateQuestion();
                }
            },

            showResults: function() {
                this.dom.progressBar.style.width = '100%';
                this.switchScreen('result');
                this.dom.finalScore.textContent = this.state.score;

                if (this.state.score >= 80) {
                    this.dom.resultEmoji.textContent = "🏆";
                    this.dom.resultMsg.textContent = "Sempurna! Kamu jenius!";
                    confetti.start();
                } else if (this.state.score >= 50) {
                    this.dom.resultEmoji.textContent = "😊";
                    this.dom.resultMsg.textContent = "Bagus! Terus berlatih.";
                } else {
                    this.dom.resultEmoji.textContent = "💪";
                    this.dom.resultMsg.textContent = "Jangan menyerang, coba lagi!";
                }
            },

            updateScoreDisplay: function() { this.dom.score.textContent = this.state.score; },

            playSound: function(type) {
                try {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    if (!AudioContext) return;
                    const ctx = new AudioContext();
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    if (type === 'success') {
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(500, ctx.currentTime);
                        osc.frequency.exponentialRampToValueAtTime(1000, ctx.currentTime + 0.1);
                        gain.gain.setValueAtTime(0.3, ctx.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                        osc.start(); osc.stop(ctx.currentTime + 0.3);
                    } else {
                        osc.type = 'sawtooth';
                        osc.frequency.setValueAtTime(200, ctx.currentTime);
                        osc.frequency.linearRampToValueAtTime(100, ctx.currentTime + 0.2);
                        gain.gain.setValueAtTime(0.3, ctx.currentTime);
                        gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                        osc.start(); osc.stop(ctx.currentTime + 0.3);
                    }
                } catch (e) {}
            }
        };

        const confetti = {
            canvas: document.getElementById('confetti-canvas'),
            ctx: null,
            particles: [],
            animationId: null,
            init: function() {
                this.ctx = this.canvas.getContext('2d');
                this.resize();
                window.addEventListener('resize', () => this.resize());
            },
            resize: function() {
                this.canvas.width = this.canvas.parentElement.offsetWidth;
                this.canvas.height = this.canvas.parentElement.offsetHeight;
            },
            createParticle: function() {
                const colors = ['#EF4444', '#10B981', '#3B82F6', '#F59E0B', '#8B5CF6'];
                return {
                    x: this.canvas.width / 2, y: this.canvas.height / 2,
                    vx: (Math.random() - 0.5) * 15, vy: (Math.random() - 0.5) * 15 - 5,
                    size: Math.random() * 8 + 4, color: colors[Math.floor(Math.random() * colors.length)],
                    rotation: Math.random() * 360, rotationSpeed: (Math.random() - 0.5) * 10, life: 120
                };
            },
            update: function() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                if (this.particles.length < 150) {
                    for(let i=0; i<8; i++) this.particles.push(this.createParticle());
                }
                for (let i = 0; i < this.particles.length; i++) {
                    let p = this.particles[i];
                    p.x += p.vx; p.y += p.vy; p.vy += 0.3; p.rotation += p.rotationSpeed; p.life--;
                    this.ctx.save();
                    this.ctx.translate(p.x, p.y);
                    this.ctx.rotate((p.rotation * Math.PI) / 180);
                    this.ctx.fillStyle = p.color;
                    this.ctx.fillRect(-p.size/2, -p.size/2, p.size, p.size);
                    this.ctx.restore();
                    if (p.life <= 0 || p.y > this.canvas.height) { this.particles.splice(i, 1); i--; }
                }
                if (this.particles.length > 0) this.animationId = requestAnimationFrame(() => this.update());
            },
            start: function() { if(!this.ctx) this.init(); this.particles = []; this.update(); },
            clear: function() { cancelAnimationFrame(this.animationId); if(this.ctx) this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height); this.particles = []; }
        };

        window.onload = function() { app.init(); };
    </script>
</body>
